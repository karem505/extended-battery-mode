<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16">
  <!-- Battery body -->
  <rect x="1" y="4" width="12" height="8" rx="1.5" ry="1.5" fill="none" stroke="#e0e0e0" stroke-width="1.2"/>
  <!-- Battery terminal -->
  <rect x="13" y="6" width="2" height="4" rx="0.5" ry="0.5" fill="#e0e0e0"/>
  <!-- Fill level (full) -->
  <rect x="2.2" y="5.2" width="9.6" height="5.6" rx="0.5" fill="#e0e0e0" opacity="0.7"/>
  <!-- Lightning bolt (performance) -->
  <polygon points="9,5 7,8.5 8.5,8.5 7.5,12 10.5,7.5 8.5,7.5 9.5,5" fill="#bdbdbd"/>
</svg>
